<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grovia | Create Account</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
}

/* grocery background */

.bg-grocery{
background-image:url("https://images.unsplash.com/photo-1542838132-92c53300491e");
background-size:cover;
background-position:center;
}

/* overlay */

.overlay{
background:rgba(0,0,0,0.45);
}

/* glass card */

.card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 30px 60px rgba(0,0,0,0.25);
}

/* button hover */

.btn:hover{
transform:scale(1.04);
transition:0.25s;
box-shadow:0 10px 25px rgba(34,197,94,0.35);
}

</style>

</head>

<body class="bg-grocery min-h-screen flex items-center justify-center">

<div class="overlay absolute inset-0"></div>

<!-- Signup Card -->

<div class="card relative rounded-3xl p-12 w-[450px]">

<div class="text-center mb-6">

<h1 class="text-3xl font-bold text-gray-800">
Create Account
</h1>

<p class="text-gray-500">
Join Grovia and start shopping fresh groceries
</p>

</div>

<div class="space-y-4">

<div>

<label class="text-sm text-gray-600">Full Name</label>
<input type="text" class="w-full border p-3 rounded-lg mt-1 focus:ring-2 focus:ring-green-400 outline-none">

</div>

<div>

<label class="text-sm text-gray-600">Email</label>
<input type="email" class="w-full border p-3 rounded-lg mt-1 focus:ring-2 focus:ring-green-400 outline-none">

</div>

<div>

<label class="text-sm text-gray-600">Password</label>
<input type="password" class="w-full border p-3 rounded-lg mt-1 focus:ring-2 focus:ring-green-400 outline-none">

</div>

<div>

<label class="text-sm text-gray-600">Confirm Password</label>
<input type="password" class="w-full border p-3 rounded-lg mt-1 focus:ring-2 focus:ring-green-400 outline-none">

</div>

</div>

<button class="btn w-full bg-green-600 text-white py-3 rounded-lg mt-6 font-semibold">
Create Account
</button>

<p class="text-center mt-6 text-gray-600">

Already have an account?

<a href="login.html" class="text-green-600 font-semibold hover:underline">

Login

</a>

</p>

</div>

</body>
</html>
