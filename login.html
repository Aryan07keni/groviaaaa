<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grovia | Welcome</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f3f9f3;
}

/* background image */

.hero{
background-image:url("https://images.unsplash.com/photo-1542838132-92c53300491e");
background-size:cover;
background-position:center;
}

/* glass login box */

.card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 25px 50px rgba(0,0,0,0.12);
}

/* button hover */

.btn:hover{
transform:scale(1.04);
transition:0.25s;
box-shadow:0 10px 25px rgba(34,197,94,0.35);
}

</style>

</head>

<body>

<header class="bg-white shadow-sm">

<div class="max-w-7xl mx-auto px-8 py-4 flex items-center gap-2">

<span class="text-3xl">🥬</span>

<h1 class="text-2xl font-bold text-green-700">
Grovia
</h1>

</div>

</header>

<section class="hero min-h-screen flex items-center justify-center">

<div class="card rounded-3xl p-12 w-[420px] text-center">

<h1 class="text-3xl font-bold text-gray-800">
Welcome to Grovia
</h1>

<p class="text-gray-500 mt-2">
Fresh groceries delivered to your door
</p>

<!-- Phone Login -->

<button class="btn w-full mt-8 bg-green-600 text-white py-3 rounded-lg font-semibold flex justify-center items-center gap-2">
<a href="phone-login.html" class="text-green-600 font-semibold hover:underline">
📱 Continue with Phone Number
</a>
</button>

<!-- Divider -->

<div class="flex items-center gap-4 my-6">

<hr class="flex-1">

<span class="text-gray-400 text-sm">OR</span>

<hr class="flex-1">

</div>

<!-- Google Login -->

<button class="btn w-full border py-3 rounded-lg flex justify-center gap-3 items-center hover:bg-gray-50">

<img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20">

Continue with Google

</button>

<!-- Signup link -->

<p class="text-gray-600 mt-8">

Don't have an account?

<a href="signup.html" class="text-green-600 font-semibold hover:underline">

Create Account

</a>

</p>

</div>

</section>

</body>
</html>
