<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Secure Checkout - Grovia</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: "#00B37E", // Modern, vibrant mint green
                            hover: "#00966a",
                            light: "#e6f7f2",
                        },
                        surface: {
                            bg: "#f8fafc", // Ultra-light cool gray for the page
                            card: "#ffffff", // Pure white for cards
                        },
                        text: {
                            main: "#0f172a", // Slate 900 for sharp contrast
                            muted: "#64748b" // Slate 500 for secondary text
                        }
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.04)',
                        'glow': '0 8px 25px -4px rgba(0, 179, 126, 0.3)',
                    }
                },
            },
        }
    </script>
    <style>
        /* Modern, minimal scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        /* Custom sleek radio buttons */
        input[type="radio"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
        }
        input[type="radio"]:checked {
            border-color: #00B37E;
            background-color: #00B37E;
        }
        input[type="radio"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
        }
        /* Hover state for entire label */
        label:hover input[type="radio"]:not(:checked) {
            border-color: #94a3b8;
        }
    </style>
</head>
<body class="font-display bg-surface-bg text-text-main min-h-screen flex flex-col antialiased selection:bg-primary-light selection:text-primary-hover">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-[72px] flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer group">
                <div class="w-10 h-10 bg-primary-light rounded-xl flex items-center justify-center group-hover:bg-primary transition-colors duration-300">
                    <span class="material-symbols-outlined text-primary group-hover:text-white transition-colors" style="font-variation-settings: 'FILL' 1;">shopping_basket</span>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight text-text-main">Grovia</h1>
            <div class="flex items-center gap-1.5 text-text-muted text-sm font-medium bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100">
                <span class="material-symbols-outlined text-[18px]">lock</span>
                <span class="hidden sm:inline">Secure</span>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl mx-auto px-6 w-full py-10 flex flex-col lg:flex-row gap-8 lg:gap-12">
        
        <div class="flex-1 max-w-2xl">
            <h2 class="text-3xl font-extrabold mb-2 text-text-main tracking-tight">How would you like to pay?</h2>
            <p class="text-base text-text-muted mb-8">All transactions are secure and encrypted.</p>
            
            <div class="space-y-6">
                
                <div>
                    <h3 class="text-sm font-bold text-text-muted uppercase tracking-wider mb-3 ml-1">UPI Payments</h3>
                    
                    <div class="bg-white rounded-3xl border border-gray-200 overflow-hidden shadow-soft">
                        <label class="flex items-center justify-between p-5 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-100 group">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center group-hover:scale-105 transition-transform duration-300">
                                    <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
                                </div>
                                <div>
                                    <p class="font-bold text-text-main text-base">Google Pay</p>
                                    <p class="text-sm text-text-muted">Pay securely via GPay</p>
                                </div>
                            </div>
                            <input type="radio" name="payment_method" checked />
                        </label>

                        <label class="flex items-center justify-between p-5 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-100 group">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center group-hover:scale-105 transition-transform duration-300">
                                    <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">payments</span>
                                </div>
                                <div>
                                    <p class="font-bold text-text-main text-base">PhonePe</p>
                                    <p class="text-sm text-text-muted">Pay securely via PhonePe</p>
                                </div>
                            </div>
                            <input type="radio" name="payment_method" />
                        </label>

                        <button class="w-full flex items-center gap-3 p-5 hover:bg-gray-50 cursor-pointer transition-colors text-left group">
                            <div class="w-12 h-12 border-2 border-dashed border-gray-300 rounded-2xl flex items-center justify-center text-gray-400 group-hover:border-primary group-hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-2xl">add</span>
                            </div>
                            <p class="font-bold text-text-main group-hover:text-primary transition-colors text-base">Add new UPI ID</p>
                        </button>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-text-muted uppercase tracking-wider mb-3 ml-1 mt-8">More Options</h3>
                    
                    <div class="bg-white rounded-3xl border border-gray-200 overflow-hidden shadow-soft">
                        <label class="flex items-center justify-between p-5 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-100 group">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-slate-100 text-slate-700 rounded-2xl flex items-center justify-center group-hover:scale-105 transition-transform duration-300">
                                    <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">credit_card</span>
                                </div>
                                <div>
                                    <p class="font-bold text-text-main text-base">Credit or Debit Card</p>
                                    <p class="text-sm text-text-muted">Visa, Mastercard, RuPay & more</p>
                                </div>
                            </div>
                            <input type="radio" name="payment_method" />
                        </label>

                        <label class="flex items-center justify-between p-5 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-100 group">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center group-hover:scale-105 transition-transform duration-300">
                                    <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">account_balance</span>
                                </div>
                                <div>
                                    <p class="font-bold text-text-main text-base">Netbanking</p>
                                    <p class="text-sm text-text-muted">All major Indian banks supported</p>
                                </div>
                            </div>
                            <input type="radio" name="payment_method" />
                        </label>
                        
                        <label class="flex items-center justify-between p-5 hover:bg-gray-50 cursor-pointer transition-colors group">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center group-hover:scale-105 transition-transform duration-300">
                                    <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
                                </div>
                                <div>
                                    <p class="font-bold text-text-main text-base">Cash on Delivery</p>
                                    <p class="text-sm text-text-muted">Pay via cash or UPI upon arrival</p>
                                </div>
                            </div>
                            <input type="radio" name="payment_method" />
                        </label>
                    </div>
                </div>

            </div>
        </div>

        <div class="w-full lg:w-[380px] shrink-0">
            <div class="bg-white rounded-3xl p-7 shadow-soft border border-gray-100 lg:sticky lg:top-28">
                
                <h3 class="text-xl font-extrabold mb-6 text-text-main tracking-tight">Order Summary</h3>
                
                <div class="space-y-4 mb-6 text-sm">
                    <div class="flex justify-between items-center text-text-muted font-medium">
                        <span>Items Total (4)</span>
                        <span class="text-text-main">₹2,450.00</span>
                    </div>
                    <div class="flex justify-between items-center text-text-muted font-medium">
                        <span>Delivery Fee</span>
                        <span class="text-primary bg-primary-light px-2 py-0.5 rounded-md font-bold text-xs uppercase tracking-wide">Free</span>
                    </div>
                    <div class="flex justify-between items-center text-text-muted font-medium">
                        <span>Taxes & Charges</span>
                        <span class="text-text-main">₹50.00</span>
                    </div>
                </div>

                <div class="h-px w-full bg-gray-100 my-6"></div>

                <div class="flex items-end justify-between mb-8">
                    <div>
                        <p class="text-sm font-semibold text-text-muted mb-1">Total Payable</p>
                        <p class="text-3xl font-extrabold text-text-main tracking-tight">₹2,500</p>
                    </div>
                </div>

                <button class="w-full bg-primary hover:bg-primary-hover text-white font-bold text-lg py-4 rounded-2xl shadow-glow transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
                    <span>Pay Securely</span>
                    <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </button>

                <div class="mt-6 flex flex-col items-center gap-4">
                    <p class="text-xs font-semibold text-text-muted flex items-center gap-1.5 uppercase tracking-widest">
                        <span class="material-symbols-outlined text-[16px]">verified_user</span>
                        100% Secure Checkout
                    </p>
                </div>
                
            </div>
        </div>

    </main>

</body>
</html>
